    @media (min-width: 640px) {

      color: var(--text-main);

    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
    }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    @media (min-width: 480px) {
      .btn-group { grid-template-columns: 1.5fr 1fr; }
    }

    button {
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border: none;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: #0f172a;
      box-shadow: 0 4px 6px -1px rgba(6, 182, 212, 0.2);
    }

    .primary-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .primary-btn:active { transform: translateY(0); }

    .secondary-btn {
      background: rgba(51, 65, 85, 0.5);
      color: var(--text-muted);
      border: 1px solid transparent;
    }

    .secondary-btn:hover {
      background: rgba(51, 65, 85, 0.8);
      color: var(--text-main);
    }

    .actions-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-top: 0.75rem;
    }

    #qrcode-container {
      background: #fff;
      padding: 1.5rem;
      border-radius: 12px;
      margin: 0 auto;
      width: fit-content;
      min-width: 200px;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
    }

    /* Placeholder text inside QR box */

      color: #94a3b8;
      font-size: 0.9rem;

    }
    
    #qrcode img {

    button:disabled {

    /* Mobile Nav Animation */

@media (min-width: 640px) {

  <main class="main-wrapper">
    <div class="app-container">
      <h1>QR Code Generator</h1>
      <p class="subtitle">Create instant, secure QR codes for any link or text.</p>

      <input type="text" id="text" placeholder="Enter URL or text (e.g. https://google.com)" autofocus />

      <button class="primary-btn w-full mb-4" onclick="generateQRCode()">
        <i class="fa-solid fa-wand-magic-sparkles"></i> Generate QR Code
      </button>

      <div id="qrcode-container">
        <div id="qrcode"><span class="qr-placeholder">Preview will appear here</span></div>
      </div>

      <div class="actions-row">
        <button class="secondary-btn" id="copyBtn" onclick="copyQRCode()" disabled>
          <i class="fa-regular fa-copy"></i> Copy
        </button>
        <button class="secondary-btn" id="saveBtn" onclick="downloadQRCode()" disabled>
          <i class="fa-solid fa-download"></i> Save
        </button>
      </div>

      <div class="footer-link">
        Part of <a href="https://usamaahmad360.github.io/Usama-s-Portfolio/">Usama’s Portfolio</a>
      </div>
    </div>
  </main>

  <script>
     // Navbar toggle (mobile)
    (function () {
      const navToggle = document.getElementById('navToggle');
      const mobileNav = document.getElementById('mobileNav');
      const navIcon = document.getElementById('navIcon');
      const topNav = document.getElementById('topNav');

      function closeMobileNav() {
        if (!mobileNav || mobileNav.classList.contains('hidden')) return;
        mobileNav.classList.add('hidden');
        if (navToggle) navToggle.setAttribute('aria-expanded', 'false');
        if (navIcon) {
          navIcon.classList.remove('fa-xmark');
          navIcon.classList.add('fa-bars');
        }
      }

      navToggle?.addEventListener('click', (e) => {
        e.stopPropagation();
        mobileNav.classList.toggle('hidden');
        const isOpen = !mobileNav.classList.contains('hidden');
        navToggle.setAttribute('aria-expanded', String(isOpen));
        if (navIcon) {
          navIcon.classList.toggle('fa-bars', !isOpen);
          navIcon.classList.toggle('fa-xmark', isOpen);
        }
      });

      document.addEventListener('click', (e) => {
        if (!topNav) return;
        if (!topNav.contains(e.target)) closeMobileNav();
      });

      mobileNav?.addEventListener('click', (e) => {
        const a = e.target.closest('a');
        if (a) closeMobileNav();
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeMobileNav();
      });
    })();

    // --- QR Logic ---
    const saveBtn = document.getElementById("saveBtn");
    const copyBtn = document.getElementById("copyBtn");

    function getQRCanvas() {
      return document.querySelector("#qrcode canvas");
    }

    function generateQRCode() {
      const text = document.getElementById("text").value.trim();
      const qrDiv = document.getElementById("qrcode");
      
      if (!text) {
        alert("Please enter some text or a URL.");
        return;
      }

      qrDiv.innerHTML = "";
      
      new QRCode(qrDiv, {
        text: text,
        width: 300,
        height: 300,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });

      // Enable buttons
      saveBtn.disabled = false;
      copyBtn.disabled = false;
    }

    async function copyQRCode() {
      const qrCanvas = getQRCanvas();

      if (!qrCanvas) {
        alert("Please generate a QR code first.");
        return;
      }

      try {
        qrCanvas.toBlob(async (blob) => {
          if (!blob) throw new Error("Canvas to Blob failed");
          
          await navigator.clipboard.write([
            new ClipboardItem({ [blob.type]: blob })
          ]);

          const originalContent = copyBtn.innerHTML;
          copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
          setTimeout(() => {
            copyBtn.innerHTML = originalContent;
          }, 2000);
        }, "image/png");
      } catch (err) {
        console.error(err);
        alert("❌ Unable to copy QR Code. Your browser might not support this feature.");
      }
    }

    function downloadQRCode() {
      const qrCanvas = getQRCanvas();

      if (!qrCanvas) {
        alert("Please generate a QR code first!");
        return;
      }

      const padding = 20;
      const size = qrCanvas.width + padding * 2;

      // Create export canvas
      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = size;
      exportCanvas.height = size;
      const ctx = exportCanvas.getContext("2d");

      // White background
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, size, size);

      // Draw QR with padding
      ctx.drawImage(qrCanvas, padding, padding);

      // Convert to blob (best for downloads)
      exportCanvas.toBlob((blob) => {
        if (!blob) {
          alert("Failed to export QR code.");
          return;
        }

        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");

        a.href = url;
        a.download = `qr-code-${Date.now()}.png`;
        document.body.appendChild(a);
        a.click();

        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, "image/png");
    }
  </script>
