    .btn-group {

    button {

      font-weight: 600;

    .primary-btn {

    .primary-btn:hover {

    .secondary-btn {

    #qrcode-container {

  <main class="main-wrapper">
    <div class="app-container">
      <h1>QR Code Generator</h1>
      <p class="subtitle">Create instant, secure QR codes for any link or text.</p>

      <input type="text" id="text" placeholder="Enter URL or text (e.g. https://google.com)" autofocus />

      <button class="primary-btn w-full mb-4" onclick="generateQRCode()">
        <i class="fa-solid fa-wand-magic-sparkles"></i> Generate QR Code
      </button>

      <div id="qrcode-container">
        <div id="qrcode"><span class="qr-placeholder">Preview will appear here</span></div>
      </div>

      <div class="actions-row">
        <button class="secondary-btn" id="copyBtn" onclick="copyQRCode()">
          <i class="fa-regular fa-copy"></i> Copy
        </button>
        <button class="secondary-btn" onclick="downloadQRCode()">
          <i class="fa-solid fa-download"></i> Save
        </button>
      </div>

      <div class="footer-link">
        Part of <a href="https://usamaahmad360.github.io/Usama-s-Portfolio/">Usama’s Portfolio</a>
      </div>
    </div>

  <script>
    // --- Navbar Logic ---
    (function () {
      const navToggle = document.getElementById('navToggle');
      const mobileNav = document.getElementById('mobileNav');
      const navIcon = document.getElementById('navIcon');
      const topNav = document.getElementById('topNav');

      function closeMobileNav() {
        if (!mobileNav.classList.contains('hidden')) {
          mobileNav.classList.add('hidden');
          navToggle.setAttribute('aria-expanded', 'false');
          navIcon.classList.replace('fa-xmark', 'fa-bars');
        }
      }

      navToggle?.addEventListener('click', (e) => {
        e.stopPropagation();
        mobileNav.classList.toggle('hidden');
        const isOpen = !mobileNav.classList.contains('hidden');
        navToggle.setAttribute('aria-expanded', String(isOpen));
        navIcon.classList.toggle('fa-bars', !isOpen);
        navIcon.classList.toggle('fa-xmark', isOpen);
      });

      document.addEventListener('click', (e) => {
        if (!topNav.contains(e.target)) closeMobileNav();
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeMobileNav();
      });
    })();

    // --- QR Logic ---
    let qrObject = null; 

    function generateQRCode() {
      const text = document.getElementById("text").value.trim();
      const qrDiv = document.getElementById("qrcode");
      
      if (!text) {
        alert("Please enter some text or a URL first.");
        return;
      }

      qrDiv.innerHTML = ""; 

      // Create new QR Code
      try {
        qrObject = new QRCode(qrDiv, {
          text: text,
          width: 256,
          height: 256,
          colorDark: "#000000",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.H
        });
      } catch (e) {
        console.error("QR Generation failed", e);
        alert("Failed to generate QR code. Please try again.");
      }
    }

    // Trigger generation on Enter key
    document.getElementById("text").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        generateQRCode();
      }
    });

    function getQRCanvasOrImg() {
      const qrDiv = document.getElementById("qrcode");
      // Try to find canvas first (qrcodejs usually creates one)
      let canvas = qrDiv.querySelector("canvas");
      let img = qrDiv.querySelector("img");
      
      // If neither, or if they are empty/loading, return null
      if (!canvas && !img) return null;
      
      // If img src is empty, it's not ready
      if (img && !img.src && !canvas) return null;

      return { canvas, img };
    }

    async function copyQRCode() {
      const elements = getQRCanvasOrImg();
      if (!elements) {
        alert("Please generate a QR code first!");
        return;
      }

      const { canvas, img } = elements;

      try {
        let blob = null;

        if (canvas) {
           blob = await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
        } else if (img && img.src) {
           const resp = await fetch(img.src);
           blob = await resp.blob();
        }

        if (blob) {
          // ClipboardItem with generic type
          const item = new ClipboardItem({ [blob.type]: blob });
          await navigator.clipboard.write([item]);
          
          const btn = document.getElementById("copyBtn");
          const original = btn.innerHTML;
          btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
          btn.style.color = '#22d3ee'; // Cyan
          btn.style.borderColor = '#22d3ee';
          setTimeout(() => {
              btn.innerHTML = original;
              btn.style.color = '';
              btn.style.borderColor = '';
          }, 2000);
        } else {
          throw new Error("Failed to create blob from QR code");
        }
      } catch (err) {
        console.error("Copy failed:", err);
        alert("Could not copy image automatically. Security restrictions may apply. Please right-click the QR image and select 'Copy Image'.");
      }
    }

    function downloadQRCode() {
      const elements = getQRCanvasOrImg();
      if (!elements) {
        alert("Please generate a QR code first!");
        return;
      }

      const { canvas, img } = elements;
      
      // Prepare download canvas with padding
      const padding = 20;
      const size = 256 + (padding * 2);
      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = size;
      tempCanvas.height = size;
      const ctx = tempCanvas.getContext("2d");

      // Fill white background
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, size, size);

      const finishDownload = () => {
        try {
          const link = document.createElement("a");
          link.download = `qr-code-${Date.now()}.png`;
          link.href = tempCanvas.toDataURL("image/png");
          document.body.appendChild(link); // Required for Firefox sometimes
          link.click();
          document.body.removeChild(link);
        } catch (e) {
          console.error("Download failed:", e);
          alert("Failed to download. Please right-click the image and save it manually.");
        }
      };

      const drawAndDownload = (source) => {
        try {
          ctx.drawImage(source, padding, padding, 256, 256);
          finishDownload();
        } catch (e) {
          console.error("Draw failed:", e);
          // Fallback: just download the source src if possible (no padding)
          if (img && img.src) {
             const link = document.createElement("a");
             link.download = `qr-code-${Date.now()}.png`;
             link.href = img.src;
             link.click();
          }
        }
      };

      if (canvas) {
        drawAndDownload(canvas);
      } else if (img) {
        if (img.complete && img.naturalHeight !== 0) {
          drawAndDownload(img);
        } else {
          img.onload = () => drawAndDownload(img);
          // Force reload if stuck?
          if (!img.complete) {
             setTimeout(() => {
                if(img.complete) drawAndDownload(img);
             }, 500);
          }
        }
      }
    }
  </script>
